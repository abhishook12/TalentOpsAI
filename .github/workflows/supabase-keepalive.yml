name: Supabase Keep-Alive

on:
  schedule:
    # Runs every 6 hours: midnight, 6am, noon, 6pm UTC
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping Supabase Database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "Pinging Supabase to prevent auto-pause..."
          python3 -c "
          import os, sys
          try:
              import psycopg2
          except ImportError:
              import subprocess
              subprocess.check_call([sys.executable, '-m', 'pip', 'install', 'psycopg2-binary', '-q'])
              import psycopg2

          url = os.environ['DATABASE_URL']
          # Normalize driver prefix
          if url.startswith('postgresql+psycopg://'):
              url = url.replace('postgresql+psycopg://', 'postgresql://')

          conn = psycopg2.connect(url, connect_timeout=10)
          cur = conn.cursor()
          cur.execute('SELECT 1 AS keepalive, current_timestamp AS pinged_at')
          row = cur.fetchone()
          print(f'✓ Supabase is alive — pinged at {row[1]}')
          cur.close()
          conn.close()
          "
