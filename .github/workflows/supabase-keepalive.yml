name: Supabase Keep-Alive

on:
  schedule:
    # Runs every 6 hours: midnight, 6am, noon, 6pm UTC
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Install dependencies
        run: pip install psycopg2-binary

      - name: Ping Supabase Database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python3 << 'EOF'
          import os, sys

          url = os.environ.get('DATABASE_URL', '')
          if not url:
              print("ERROR: DATABASE_URL secret is empty!")
              sys.exit(1)

          # Normalize any SQLAlchemy driver prefix
          url = url.replace('postgresql+psycopg://', 'postgresql://')
          url = url.replace('postgresql+psycopg2://', 'postgresql://')

          # Ensure sslmode is set for Supabase
          if '?' not in url:
              url += '?sslmode=require'
          elif 'sslmode' not in url:
              url += '&sslmode=require'

          import psycopg2
          try:
              conn = psycopg2.connect(url, connect_timeout=15)
              cur = conn.cursor()
              cur.execute('SELECT 1 AS keepalive, current_timestamp AS pinged_at')
              row = cur.fetchone()
              print(f'✅ Supabase is alive — pinged at {row[1]}')
              cur.close()
              conn.close()
          except Exception as e:
              print(f'❌ Failed to ping Supabase: {e}')
              sys.exit(1)
          EOF
