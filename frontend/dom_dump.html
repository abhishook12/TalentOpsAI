  <body>
    <div id="root"><style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
  @import url('https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css');

  :root {
    --sidebar-width: 276px;
    --main-bg: #f8fafc;
    --panel-bg: #ffffff;
    --card-bg: #ffffff;
    --bg-primary: #f8fafc;
    --bg-surface: #ffffff;
    --card-border: #e2e8f0;
    --card-border-strong: #cbd5e1;
    --sidebar-bg: #0d1527;
    --sidebar-border: #1c2741;
    --text-primary: #0f172a;
    --text-secondary: #475569;
    --text-muted: #94a3b8;
    --text-inverse: #ffffff;
    --accent: #0ea5e9;
    --accent-strong: #0284c7;
    --accent-bg: #e0f2fe;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --muted-grid: rgba(0, 0, 0, 0.03);
    --dark-panel: #f1f5f9;
    --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
    --shadow-lg: 0 10px 24px rgba(0, 0, 0, 0.08);
    --radius: 14px;
    --radius-lg: 18px;
    --font: 'Inter', system-ui, sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }

  [data-theme='dark'] {
    --main-bg: #141414;
    --panel-bg: #1b1b1b;
    --card-bg: #202020;
    --bg-primary: #141414;
    --bg-surface: #1b1b1b;
    --card-border: #343434;
    --card-border-strong: #4a4a4a;
    --sidebar-bg: #151515;
    --sidebar-border: #2a2a2a;
    --text-primary: #f2f2f2;
    --text-secondary: #cdcdcd;
    --text-muted: #959595;
    --text-inverse: #111111;
    --accent: #0ea5e9;
    --accent-strong: #38bdf8;
    --accent-bg: rgba(14, 165, 233, 0.15);
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --muted-grid: rgba(255, 255, 255, 0.05);
    --dark-panel: #171717;
    --shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
    --shadow-lg: 0 18px 44px rgba(0, 0, 0, 0.34);
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body, #root {
    color-scheme: light;
    min-height: 100%;
    margin: 0;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.0)),
      linear-gradient(180deg, var(--bg-primary), var(--bg-primary));
    color: var(--text-primary);
    font-family: var(--font);
    overflow-x: hidden;
    overflow-y: auto;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  html[data-theme='dark'] { color-scheme: dark; }
  html[data-theme='dark'] body,
  html[data-theme='dark'] #root {
    background: var(--main-bg);
  }

  html[data-theme='dark'] .cc-content {
    background: linear-gradient(180deg, var(--bg-primary), var(--bg-primary)) !important;
  }

  html[data-theme='dark'] .cc-footer {
    background: rgba(22,22,22,0.95) !important;
    border-top-color: #313131 !important;
  }

  html[data-theme='dark'] .card,
  html[data-theme='dark'] .cc-card,
  html[data-theme='dark'] .cc-metric {
    background: #1c1c1c !important;
    border-color: #343434 !important;
    box-shadow: none !important;
  }
  
  html[data-theme='dark'] .cc-topbar {
    background: rgba(21, 21, 21, 0.96) !important;
  }

  html[data-theme='dark'] th {
    background: #181818 !important;
    color: #dddddd !important;
    border-bottom-color: #333333 !important;
  }

  html[data-theme='dark'] td {
    color: #f0f0f0 !important;
    border-bottom-color: #333333 !important;
  }

  html[data-theme='dark'] tr:hover td {
    background: #242424 !important;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(to right, var(--muted-grid) 1px, transparent 1px),
      linear-gradient(to bottom, var(--muted-grid) 1px, transparent 1px);
    background-size: 32px 32px;
    mask-image: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent 92%);
    opacity: 0.8;
    z-index: 0;
  }

  #root {
    position: relative;
    z-index: 1;
    min-height: 100dvh;
  }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(120, 130, 145, 0.35); border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(120, 130, 145, 0.58); border: 2px solid transparent; background-clip: padding-box; }

  a { color: inherit; text-decoration: none; }
  button, input, select, textarea { font: inherit; }
  button { border: none; }

  button.btn-secondary,
  button.btn-primary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 16px;
    border-radius: 12px;
    font-weight: 700;
    transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
    cursor: pointer;
    border: 1px solid transparent;
  }

  button.btn-secondary {
    background: var(--card-bg);
    color: var(--text-primary);
    border-color: var(--card-border);
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }

  button.btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-strong));
    color: var(--text-inverse);
    box-shadow: 0 10px 22px rgba(195,93,8,0.16);
  }

  button.btn-secondary:hover:not(:disabled),
  button.btn-primary:hover:not(:disabled) {
    transform: translateY(-1px);
  }

  button:disabled {
    opacity: 0.55;
    cursor: not-allowed;
  }

  input, select, textarea {
    background: var(--panel-bg);
    color: var(--text-primary);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease, background 0.15s ease;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-bg);
  }
  input::placeholder, textarea::placeholder { color: var(--text-muted); }

  table { border-collapse: collapse; width: 100%; }
  th, td { text-align: left; }
  th {
    padding: 12px 14px;
    font-size: 10.5px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 800;
    background: rgba(255,255,255,0.55);
    border-bottom: 1px solid var(--card-border);
  }
  td {
    padding: 12px 14px;
    border-bottom: 1px solid var(--card-border);
    color: var(--text-primary);
  }
  tr:hover td { background: rgba(255,255,255,0.65); }

  .card, .cc-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
  }

  .page-enter { animation: ccFadeUp 0.26s ease both; }

  .cc-shell {
    min-height: 100dvh;
    display: flex;
    background: transparent;
    color: var(--text-primary);
  }

  .cc-main {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
  }

  .cc-topbar {
